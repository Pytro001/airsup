<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manufacturing · Airsup</title>
  <link rel="icon" type="image/png" href="assets/brand/logo-air-sup.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <script>document.documentElement.dataset.theme = "dark";</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 300;
      background: #0a0a12;
      color: #f2f2f3;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    .sp-header {
      flex-shrink: 0;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      z-index: 10;
    }
    .sp-brand {
      display: inline-flex; align-items: center; gap: 9px;
      font-weight: 500; font-size: 15px; color: #f2f2f3;
    }
    .sp-brand img {
      height: 28px; width: 28px; border-radius: 7px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.1);
    }

    .mfg-layout {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    /* ── Globe panel ── */
    .globe-panel {
      flex: 0 0 60%;
      position: relative;
      overflow: hidden;
      cursor: grab;
      user-select: none;
    }
    .globe-panel:active { cursor: grabbing; }
    #globe-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Nav arrows */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.55);
      width: 40px; height: 40px;
      border-radius: 50%;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      z-index: 5;
      line-height: 1;
    }
    .nav-arrow:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .nav-arrow--left  { left: 20px; }
    .nav-arrow--right { right: 20px; }

    /* Planet dots */
    .planet-dots {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 5;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: background 0.3s, transform 0.3s;
    }
    .dot.active {
      background: rgba(255,255,255,0.8);
      transform: scale(1.3);
    }

    /* ── Info panel ── */
    .info-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 40px 36px 40px;
      border-left: 1px solid rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }

    .planet-info {
      position: absolute;
      inset: 0;
      padding: 40px 36px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .planet-info.active {
      opacity: 1;
      pointer-events: auto;
    }

    .planet-info h2 {
      font-size: clamp(36px, 4vw, 58px);
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #f2f2f3;
    }

    .planet-photo-wrap {
      flex: 1;
      min-height: 0;
      border-radius: 20px;
      overflow: hidden;
      background: #111118;
    }
    .planet-photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.4s;
    }

    @media (max-width: 700px) {
      html, body { overflow: auto; height: auto; }
      .mfg-layout { flex-direction: column; height: auto; }
      .globe-panel { flex: 0 0 60vw; height: 60vw; }
      .info-panel { padding: 24px 20px; min-height: 50vw; position: relative; }
      .planet-info { position: relative; inset: auto; padding: 0; }
      .planet-info:not(.active) { display: none; }
    }
  </style>
</head>
<body>
  <header class="sp-header">
    <a href="/" class="sp-brand">
      <img src="assets/brand/logo-air-sup.png" alt="Airsup" width="22" height="22" />
    </a>
  </header>

  <div class="mfg-layout">
    <div class="globe-panel" id="globe-panel">
      <canvas id="globe-canvas"></canvas>
      <button class="nav-arrow nav-arrow--left"  id="nav-prev" aria-label="Previous">&#8592;</button>
      <button class="nav-arrow nav-arrow--right" id="nav-next" aria-label="Next">&#8594;</button>
      <div class="planet-dots" id="planet-dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>

    <aside class="info-panel" id="info-panel">
      <div class="planet-info active" id="info-earth">
        <h2>Earth</h2>
        <div class="planet-photo-wrap">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/97/The_Earth_seen_from_Apollo_17.jpg/1024px-The_Earth_seen_from_Apollo_17.jpg" alt="Earth from Apollo 17" />
        </div>
      </div>
      <div class="planet-info" id="info-moon">
        <h2>Moon</h2>
        <div class="planet-photo-wrap">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e1/FullMoon2010.jpg/1024px-FullMoon2010.jpg" alt="Full Moon" />
        </div>
      </div>
      <div class="planet-info" id="info-mars">
        <h2>Mars</h2>
        <div class="planet-photo-wrap">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/02/OSIRIS_Mars_true_color.jpg/1024px-OSIRIS_Mars_true_color.jpg" alt="Mars true color" />
        </div>
      </div>
    </aside>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
  (function () {
    const PLANETS = [
      {
        key:      'earth',
        texUrl:   'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/textures/planets/earth_atmos_2048.jpg',
        atmo:     0x3a88cc,
        atmoOp:   0.18,
        rotSpeed: 0.0022,
        tilt:     0.41,
      },
      {
        key:      'moon',
        texUrl:   'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/textures/planets/moon_1024.jpg',
        atmo:     0x888888,
        atmoOp:   0.03,
        rotSpeed: 0.0007,
        tilt:     0.03,
      },
      {
        key:      'mars',
        texUrl:   'https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg',
        atmo:     0xcc5522,
        atmoOp:   0.10,
        rotSpeed: 0.0020,
        tilt:     0.44,
      },
    ];

    const panel    = document.getElementById('globe-panel');
    const canvas   = document.getElementById('globe-canvas');
    const dotsEl   = document.getElementById('planet-dots');
    const infoPanels = {
      earth: document.getElementById('info-earth'),
      moon:  document.getElementById('info-moon'),
      mars:  document.getElementById('info-mars'),
    };

    // ── Renderer ────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x07070f, 1);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(48, 1, 0.1, 200);
    camera.position.z = 6.5;

    function onResize() {
      const w = panel.clientWidth, h = panel.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    onResize();
    window.addEventListener('resize', onResize);

    // ── Stars ────────────────────────────────────────────────────────────
    const starsGeo = new THREE.BufferGeometry();
    const starPos  = new Float32Array(3000 * 3);
    for (let i = 0; i < 3000 * 3; i++) starPos[i] = (Math.random() - 0.5) * 120;
    starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.07, sizeAttenuation: true })));

    // ── Lights ───────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0x1a2a44, 1.0));
    const sun = new THREE.DirectionalLight(0xfff0e0, 2.0);
    sun.position.set(8, 5, 8);
    scene.add(sun);
    const fill = new THREE.DirectionalLight(0x224466, 0.2);
    fill.position.set(-6, -3, -4);
    scene.add(fill);

    // ── Globe mesh ────────────────────────────────────────────────────────
    const RADIUS = 2.2;
    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    const tiltGroup = new THREE.Group();
    globeGroup.add(tiltGroup);

    const sphereGeo = new THREE.SphereGeometry(RADIUS, 128, 128);
    const sphereMat = new THREE.MeshPhongMaterial({ shininess: 10, specular: new THREE.Color(0x080810) });
    const sphereMesh = new THREE.Mesh(sphereGeo, sphereMat);
    tiltGroup.add(sphereMesh);

    // Atmosphere
    const atmoGeo  = new THREE.SphereGeometry(RADIUS * 1.04, 64, 64);
    const atmoMat  = new THREE.MeshPhongMaterial({ transparent: true, side: THREE.BackSide, depthWrite: false });
    const atmoMesh = new THREE.Mesh(atmoGeo, atmoMat);
    tiltGroup.add(atmoMesh);

    // ── Texture loading ───────────────────────────────────────────────────
    const loader   = new THREE.TextureLoader();
    loader.crossOrigin = 'anonymous';
    const texCache = {};

    function loadTex(url, onDone) {
      if (texCache[url]) { onDone(texCache[url]); return; }
      loader.load(url, tex => {
        tex.colorSpace = THREE.SRGBColorSpace;
        texCache[url]  = tex;
        onDone(tex);
      });
    }

    // ── State & transition ────────────────────────────────────────────────
    let currentIdx  = 0;
    let anim        = null; // { phase:'out'|'in', t, dir, nextIdx }
    let rotSpeed    = PLANETS[0].rotSpeed;

    function easeInQuad(t)  { return t * t; }
    function easeOutQuad(t) { return 1 - (1 - t) * (1 - t); }
    const SLIDE_DIST = 9;

    function applyPlanet(idx) {
      const p = PLANETS[idx];
      tiltGroup.rotation.z = p.tilt;
      rotSpeed = p.rotSpeed;
      atmoMat.color.setHex(p.atmo);
      atmoMat.opacity = p.atmoOp;
      loadTex(p.texUrl, tex => { sphereMat.map = tex; sphereMat.needsUpdate = true; });
    }

    function updateUI(idx) {
      const key = PLANETS[idx].key;
      Object.values(infoPanels).forEach(el => el.classList.remove('active'));
      infoPanels[key].classList.add('active');
      Array.from(dotsEl.children).forEach((d, i) => d.classList.toggle('active', i === idx));
    }

    function navigate(dir) {
      if (anim) return;
      const nextIdx = (currentIdx + dir + PLANETS.length) % PLANETS.length;
      anim = { phase: 'out', t: 0, dir, nextIdx };
    }

    // Init first planet
    applyPlanet(0);
    updateUI(0);

    // Pre-load all textures
    PLANETS.forEach(p => loadTex(p.texUrl, () => {}));

    // ── Controls ──────────────────────────────────────────────────────────
    document.getElementById('nav-prev').addEventListener('click', () => navigate(-1));
    document.getElementById('nav-next').addEventListener('click', () => navigate(1));

    // Keyboard
    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') navigate(1);
      if (e.key === 'ArrowLeft')  navigate(-1);
    });

    // Touch / mouse drag swipe
    let dragStartX = null;
    function onDragStart(x) { dragStartX = x; }
    function onDragEnd(x) {
      if (dragStartX === null) return;
      const dx = x - dragStartX;
      dragStartX = null;
      if (Math.abs(dx) > 50) navigate(dx < 0 ? 1 : -1);
    }
    panel.addEventListener('mousedown',  e => onDragStart(e.clientX));
    window.addEventListener('mouseup',   e => onDragEnd(e.clientX));
    panel.addEventListener('touchstart', e => onDragStart(e.touches[0].clientX), { passive: true });
    panel.addEventListener('touchend',   e => onDragEnd(e.changedTouches[0].clientX), { passive: true });

    // ── Animation loop ────────────────────────────────────────────────────
    const SPEED = 0.055;

    function animate() {
      requestAnimationFrame(animate);

      if (anim) {
        anim.t = Math.min(anim.t + SPEED, 1);

        if (anim.phase === 'out') {
          globeGroup.position.x = easeInQuad(anim.t) * SLIDE_DIST * -anim.dir;
          if (anim.t >= 1) {
            // Swap planet
            currentIdx = anim.nextIdx;
            applyPlanet(currentIdx);
            updateUI(currentIdx);
            globeGroup.position.x = SLIDE_DIST * anim.dir;
            anim = { phase: 'in', t: 0, dir: anim.dir, nextIdx: anim.nextIdx };
          }
        } else {
          const ease = easeOutQuad(anim.t);
          globeGroup.position.x = (1 - ease) * SLIDE_DIST * anim.dir;
          if (anim.t >= 1) {
            globeGroup.position.x = 0;
            anim = null;
          }
        }
      }

      sphereMesh.rotation.y += rotSpeed;
      renderer.render(scene, camera);
    }

    animate();
  })();
  </script>
</body>
</html>
