<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airsup — AI Manufacturing Sourcing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header" id="site-header">
    <div id="auth-banner" class="auth-banner" role="status" hidden></div>
    <div class="header-inner">
      <button type="button" id="logo-home" class="site-logo" aria-label="Home">
        <img src="assets/brand/logo-air-sup.png" alt="Airsup" />
      </button>
      <nav class="header-nav" id="header-nav">
        <button type="button" class="nav-link active" data-view="chat">Chat</button>
        <button type="button" class="nav-link" data-view="projects">Projects</button>
        <button type="button" class="nav-link" data-view="connections">Connections</button>
      </nav>
      <div class="header-right" id="header-account" hidden>
        <button type="button" class="avatar-btn" id="user-menu-trigger" aria-label="Account menu">
          <span class="avatar-letter" id="avatar-letter">?</span>
        </button>
        <div class="dropdown" id="user-menu-dropdown" hidden>
          <button type="button" class="dropdown-item" id="menu-settings">Settings</button>
          <button type="button" class="dropdown-item" id="menu-signout">Log out</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <!-- Onboarding -->
    <section class="page active" id="page-onboarding">
      <div class="onboard">
        <div class="onboard-progress" id="onboard-progress"><div class="onboard-progress-bar" id="onboard-bar"></div></div>
        <div class="onboard-stage" id="onboard-stage"></div>
      </div>
    </section>

    <!-- Chat -->
    <section class="page" id="page-chat">
      <div class="chat-container">
        <div class="chat-messages" id="chat-messages">
          <div class="chat-welcome" id="chat-welcome">
            <h2>Welcome to Airsup</h2>
            <p>Tell me about what you need manufactured. I'll find the right factories for you.</p>
          </div>
        </div>
        <div class="chat-composer">
          <div class="composer-inner">
            <textarea class="composer-input" id="chat-input" rows="1" placeholder="Describe what you need…" autocomplete="off"></textarea>
            <button type="button" class="composer-send" id="chat-send" aria-label="Send" disabled>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- Projects -->
    <section class="page" id="page-projects">
      <div class="page-content">
        <h1 class="page-title">Projects</h1>
        <p class="page-lead" id="projects-lead">Sourcing requests created from your conversations.</p>
        <div id="projects-list" class="projects-grid"></div>
      </div>
    </section>

    <!-- Connections -->
    <section class="page" id="page-connections">
      <div class="page-content">
        <h1 class="page-title">Connections</h1>
        <p class="page-lead">Matched factories with summaries and next steps.</p>
        <div id="connections-list" class="connections-list"></div>
      </div>
    </section>

    <!-- Settings -->
    <section class="page" id="page-settings">
      <div class="page-content page-content--narrow">
        <h1 class="page-title">Settings</h1>
        <div id="settings-root"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
