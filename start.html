<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Start — Airsup</title>
  <link rel="icon" type="image/png" href="assets/brand/logo-air-sup.png" />
  <script>
    (function () {
      try {
        var t = localStorage.getItem("airsupTheme");
        document.documentElement.dataset.theme = (t === "light") ? "light" : "dark";
      } catch (e) { document.documentElement.dataset.theme = "dark"; }
    })();
  </script>
  <script src="assets/theme.js" defer></script>
  <style>
    :root {
      --page-bg: #fff; --text: #111; --text-muted: #666; --text-soft: #999;
      --border: #e8e8e8; --card-bg: #fff; --accent-bg: #f5f5f5;
      --primary: #111; --primary-hover: #333; --on-primary: #fff;
      --shadow-card: 0 4px 18px rgba(0,0,0,0.07);
      color-scheme: light;
    }
    html[data-theme="dark"] {
      --page-bg: #0b0b0d; --text: #f2f2f3; --text-muted: #9a9aa2; --text-soft: #6b6b73;
      --border: #26262b; --card-bg: #111114; --accent-bg: #1d1d22;
      --primary: #f2f2f3; --primary-hover: #dcdce0; --on-primary: #0b0b0d;
      --shadow-card: 0 4px 18px rgba(0,0,0,0.5);
      color-scheme: dark;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--page-bg); color: var(--text); line-height: 1.55;
      min-height: 100dvh; display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font: inherit; }

    .start-header {
      padding: 20px 28px; display: flex; align-items: center; justify-content: space-between;
    }
    .start-logo {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 4px 0; border-radius: 8px; transition: opacity 0.15s;
    }
    .start-logo:hover { opacity: 0.85; }
    .start-logo img { display: block; width: 32px; height: 32px; border-radius: 8px; object-fit: contain; }
    html[data-theme="dark"] .start-logo img { box-shadow: 0 0 0 1px rgba(255,255,255,0.1); }
    .lp-theme-toggle {
      width: 34px; height: 34px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--text-muted); transition: color 0.15s, background 0.15s;
    }
    .lp-theme-toggle:hover { color: var(--text); background: var(--accent-bg); }

    .start-main {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 24px 24px 80px; text-align: center;
    }
    .start-h {
      font-size: clamp(15px, 3.4vw, 30px);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 28px;
      width: 100%;
      max-width: 92vw;
      line-height: 1.2;
      white-space: nowrap;
      text-align: center;
    }
    @media (max-width: 360px) {
      .start-h { font-size: clamp(13px, 3.1vw, 16px); }
    }
    @media (max-width: 320px) {
      .start-h { white-space: normal; }
    }
    .start-choices {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
      width: 100%; max-width: 520px;
    }
    .start-choice {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 22px; border-radius: 14px;
      border: 1.5px solid var(--border); background: var(--card-bg);
      text-align: center; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      color: var(--text);
    }
    .start-choice:hover {
      border-color: var(--text); box-shadow: var(--shadow-card); transform: translateY(-1px);
    }
    html[data-theme="dark"] .start-choice:hover {
      border-color: rgba(255,255,255,0.14); box-shadow: none; transform: none; background: #141418;
    }
    .start-choice-title { font-size: 16px; font-weight: 600; }
    @media (max-width: 520px) {
      .start-choices { grid-template-columns: 1fr; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="start-header">
    <a href="/" class="start-logo" aria-label="Airsup home">
      <img src="assets/brand/logo-air-sup.png" alt="" width="32" height="32" />
    </a>
    <button type="button" class="lp-theme-toggle" data-theme-toggle aria-label="Toggle theme"></button>
  </header>

  <main class="start-main">
    <h1 class="start-h">Are you a Customer or Supplier?</h1>
    <div class="start-choices">
      <a href="/onboard?role=startup" class="start-choice">
        <span class="start-choice-title">Customer</span>
      </a>
      <a href="/onboard?role=supplier" class="start-choice">
        <span class="start-choice-title">Supplier</span>
      </a>
    </div>
  </main>
</body>
</html>
