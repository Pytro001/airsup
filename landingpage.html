<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airsup</title>
  <meta name="description" content="From idea to factory, in one conversation." />
  <meta property="og:title" content="Airsup" />
  <meta property="og:description" content="From idea to factory, in one conversation." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/assets/brand/logo-air-sup.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" type="image/png" href="assets/brand/logo-air-sup.png" />
  <link rel="apple-touch-icon" href="assets/brand/logo-air-sup.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff; color: #111; line-height: 1.55;
      min-height: 100dvh; -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
    }
    a { color: inherit; text-decoration: none; }
    button, input { font-family: inherit; font-size: inherit; }
    button { cursor: pointer; border: none; background: none; }
    img { display: block; max-width: 100%; }

    /* ── Header ── */
    .lp-header {
      padding: 20px 28px; display: flex; align-items: center;
      justify-content: space-between;
    }
    .lp-brand {
      display: inline-flex; align-items: center; gap: 9px;
      font-weight: 600; font-size: 16px; color: #111;
    }
    .lp-brand img { height: 22px; width: 22px; border-radius: 2px; }
    .lp-login-link {
      font-size: 14px; font-weight: 500; color: #666;
      padding: 8px 0; transition: color 0.15s;
    }
    .lp-login-link:hover { color: #111; }

    /* ── Main ── */
    .lp-main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 24px 96px;
      text-align: center;
    }
    .lp-headline {
      font-size: clamp(34px, 5.5vw, 58px); line-height: 1.05;
      letter-spacing: -0.03em; font-weight: 600; margin-bottom: 14px;
    }
    .lp-sub {
      font-size: 17px; color: #666; margin-bottom: 44px; max-width: 440px;
    }

    /* ── Choice cards ── */
    .lp-choices {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
      width: 100%; max-width: 560px; margin-bottom: 48px;
    }
    .lp-choice {
      display: flex; flex-direction: column; align-items: flex-start;
      padding: 26px 24px; border-radius: 14px;
      border: 1.5px solid #e8e8e8; background: #fff;
      text-align: left; cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      text-decoration: none; color: #111;
    }
    .lp-choice:hover {
      border-color: #111;
      box-shadow: 0 4px 18px rgba(0,0,0,0.07);
      transform: translateY(-1px);
    }
    .lp-choice-icon {
      width: 36px; height: 36px; border-radius: 9px;
      background: #f5f5f5; display: flex; align-items: center;
      justify-content: center; margin-bottom: 14px; flex-shrink: 0;
    }
    .lp-choice-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .lp-choice-sub { font-size: 13px; color: #888; line-height: 1.4; }

    /* ── Login ── */
    .lp-login { width: 100%; max-width: 360px; }
    .lp-login-label {
      font-size: 13px; color: #999; margin-bottom: 10px;
    }
    .lp-login-row {
      display: flex; gap: 8px;
    }
    .lp-email-input {
      flex: 1; padding: 11px 14px; border-radius: 999px;
      border: 1.5px solid #e8e8e8; font-size: 14px; outline: none;
      transition: border-color 0.15s; background: #fff;
    }
    .lp-email-input:focus { border-color: #111; }
    .lp-email-btn {
      padding: 11px 20px; border-radius: 999px;
      background: #111; color: #fff;
      font-size: 14px; font-weight: 500;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .lp-email-btn:hover { background: #333; }
    .lp-email-btn:disabled { opacity: 0.5; cursor: default; }
    .lp-login-msg {
      font-size: 13px; margin-top: 10px; min-height: 18px;
      color: #666; display: none;
    }
    .lp-login-msg--error { color: #d93025; }

    /* ── Footer ── */
    .lp-footer {
      padding: 20px 24px; text-align: center;
      font-size: 12px; color: #bbb; border-top: 1px solid #f0f0f0;
    }
    .lp-footer a { color: #bbb; margin: 0 8px; transition: color 0.15s; }
    .lp-footer a:hover { color: #666; }

    @media (max-width: 480px) {
      .lp-choices { grid-template-columns: 1fr; }
      .lp-login-row { flex-direction: column; }
      .lp-email-btn { border-radius: 999px; }
    }
  </style>
</head>
<body>
  <header class="lp-header">
    <div class="lp-brand">
      <img src="assets/brand/logo-air-sup.png" alt="Airsup" />
      Airsup
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <a href="/dashboard?role=supplier" class="lp-login-link">Supplier</a>
      <button type="button" class="lp-login-link" id="lp-login-toggle">Login</button>
    </div>
  </header>

  <main class="lp-main">
    <!-- cursor-tracking face -->
    <div style="margin-bottom:16px;">
      <!--
        viewBox 200×200 square logo.
        Left eye:  x=23, y=37, w=72, h=76 → center (59, 75)
        Right eye: x=106,y=37, w=72, h=76 → center (142, 75)
        Pupils centered inside each eye at rest: left x=46 y=61, right x=129 y=61
        MAX_OFFSET=20 lets pupils travel fully in all directions.
      -->
      <svg id="face-svg" viewBox="0 0 200 200" width="120" height="120"
           xmlns="http://www.w3.org/2000/svg"
           style="display:block;margin:0 auto;">
        <!-- full black square body -->
        <rect x="0" y="0" width="200" height="200" rx="22" fill="#000"/>
        <!-- left eye white rounded square -->
        <rect x="23" y="37" width="72" height="76" rx="12" fill="#fff"/>
        <!-- left pupil, centered at (59, 75) -->
        <g id="pupil-l-g">
          <rect x="46" y="61" width="26" height="28" rx="6" fill="#000"/>
        </g>
        <!-- right eye white rounded square -->
        <rect x="106" y="37" width="72" height="76" rx="12" fill="#fff"/>
        <!-- right pupil, centered at (142, 75) -->
        <g id="pupil-r-g">
          <rect x="129" y="61" width="26" height="28" rx="6" fill="#000"/>
        </g>
        <!-- eyelids (black, slide down from top of each eye to cover it) -->
        <clipPath id="clip-l"><rect x="23" y="37" width="72" height="76" rx="12"/></clipPath>
        <clipPath id="clip-r"><rect x="106" y="37" width="72" height="76" rx="12"/></clipPath>
        <rect id="lid-l" x="23" y="37" width="72" height="0" rx="12" fill="#000" clip-path="url(#clip-l)"/>
        <rect id="lid-r" x="106" y="37" width="72" height="0" rx="12" fill="#000" clip-path="url(#clip-r)"/>
      </svg>
    </div>

    <h1 class="lp-headline">From idea to factory,<br>in one conversation.</h1>

    <div style="margin-bottom:40px;">
      <a href="/dashboard?role=startup" class="lp-choice" style="display:inline-flex;align-items:center;justify-content:center;padding:14px 32px;border-radius:999px;max-width:320px;width:100%;">
        <span style="font-size:15px;font-weight:600;">I need something manufactured</span>
      </a>
    </div>

    <div class="lp-login" id="lp-login-section" style="display:none;">
      <div class="lp-login-row">
        <input type="tel" class="lp-email-input" id="lp-phone" placeholder="+1 555 000 0000" autocomplete="tel" />
      </div>
      <div class="lp-login-row" style="margin-top:8px;">
        <input type="password" class="lp-email-input" id="lp-pin" placeholder="PIN" maxlength="30" autocomplete="current-password" style="max-width:130px;" />
        <button type="button" class="lp-email-btn" id="lp-send-btn">Login</button>
      </div>
      <p style="font-size:12px;color:#aaa;margin-top:8px;text-align:left;">First time? Just pick any PIN and you're in.</p>
      <p class="lp-login-msg" id="lp-login-msg"></p>
    </div>
  </main>

  <footer class="lp-footer">
    <span>&copy; <span id="lp-year"></span> Airsup</span>
    <a href="/support">Support</a>
    <a href="/privacy">Privacy Policy</a>
    <a href="/terms">Terms of Service</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script>
    document.getElementById("lp-year").textContent = new Date().getFullYear();

    const cfg = window.AIRSUP_CONFIG || {};
    const sb = cfg.supabaseUrl && cfg.supabaseAnonKey
      ? window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey)
      : null;

    // Toggle login section
    const loginToggle = document.getElementById("lp-login-toggle");
    const loginSection = document.getElementById("lp-login-section");
    loginToggle.addEventListener("click", () => {
      const visible = loginSection.style.display !== "none";
      loginSection.style.display = visible ? "none" : "block";
      loginToggle.textContent = visible ? "Login" : "Close";
      if (!visible) document.getElementById("lp-email").focus();
    });

    // Phone + PIN login
    // Phone is normalized and used as a fake email internally.
    // No SMS, no email, costs nothing, works forever.
    const phoneInput = document.getElementById("lp-phone");
    const pinInput   = document.getElementById("lp-pin");
    const sendBtn    = document.getElementById("lp-send-btn");
    const msgEl      = document.getElementById("lp-login-msg");

    function showMsg(text, isError) {
      msgEl.textContent = text;
      msgEl.style.display = "block";
      msgEl.className = "lp-login-msg" + (isError ? " lp-login-msg--error" : "");
    }

    function phoneToFakeEmail(phone) {
      // Strip everything except digits and leading +
      const digits = phone.replace(/[^0-9]/g, "");
      return digits + "@login.airsup";
    }

    async function doLogin() {
      const phone = phoneInput.value.trim();
      const pin   = pinInput.value;
      if (!phone || phone.replace(/[^0-9]/g, "").length < 7) { showMsg("Enter a valid phone number with country code.", true); return; }
      if (!pin || pin.length < 4) { showMsg("PIN must be at least 4 characters.", true); return; }
      if (!sb) { showMsg("Not configured.", true); return; }
      sendBtn.disabled = true;
      sendBtn.textContent = "Signing in…";
      const fakeEmail = phoneToFakeEmail(phone);

      // Try sign in first
      const { data: siData, error: siErr } = await sb.auth.signInWithPassword({ email: fakeEmail, password: pin });
      if (!siErr && siData?.session) { window.location.href = "/dashboard"; return; }

      // If wrong credentials (user exists but wrong PIN)
      const notFound = siErr?.message?.toLowerCase().includes("invalid") || siErr?.message?.toLowerCase().includes("credentials");
      if (!notFound) {
        sendBtn.disabled = false; sendBtn.textContent = "Login";
        showMsg(siErr?.message || "Login failed.", true); return;
      }

      // Try sign up (new user)
      const { data: suData, error: suErr } = await sb.auth.signUp({ email: fakeEmail, password: pin, options: { data: { phone } } });
      if (suErr) {
        sendBtn.disabled = false; sendBtn.textContent = "Login";
        showMsg(suErr.message || "Could not create account.", true); return;
      }
      if (suData?.session) { window.location.href = "/dashboard"; return; }

      // signUp succeeded but email confirmation is ON — instruct to disable it
      sendBtn.disabled = false; sendBtn.textContent = "Login";
      showMsg("Almost there! Disable 'Email confirmations' in Supabase Auth settings, then try again.", true);
    }

    sendBtn.addEventListener("click", doLogin);
    phoneInput.addEventListener("keydown", (e) => { if (e.key === "Enter") pinInput.focus(); });
    pinInput.addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });

    // Cursor-tracking eyes with smooth lerp (lazy follow)
    // Target offset is computed instantly from mouse position, but the
    // rendered offset eases toward the target each animation frame.
    // LERP = 0.06 → pupils lag ~16 frames behind → feels fluid, not instant.
    const SVG_SIZE  = 200;
    const MAX_OFFSET = 20;
    const LERP = 0.06; // lower = lazier / more delayed

    const eyeDefs = [
      { group: document.getElementById("pupil-l-g"), ecx: 59,  ecy: 75, cx: 0, cy: 0, tx: 0, ty: 0 },
      { group: document.getElementById("pupil-r-g"), ecx: 142, ecy: 75, cx: 0, cy: 0, tx: 0, ty: 0 },
    ];

    let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    document.addEventListener("mousemove", (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });

    function tick() {
      const svg = document.getElementById("face-svg");
      const r = svg.getBoundingClientRect();

      for (const eye of eyeDefs) {
        // Eye centre in screen pixels
        const ex = r.left + (eye.ecx / SVG_SIZE) * r.width;
        const ey = r.top  + (eye.ecy / SVG_SIZE) * r.height;

        const dx = mouse.x - ex;
        const dy = mouse.y - ey;
        const angle = Math.atan2(dy, dx);
        const dist  = Math.min(Math.hypot(dx, dy) / 120, 1);

        // Target offset in SVG units
        eye.tx = Math.cos(angle) * MAX_OFFSET * dist;
        eye.ty = Math.sin(angle) * MAX_OFFSET * dist;

        // Lerp current toward target (smooth follow)
        eye.cx += (eye.tx - eye.cx) * LERP;
        eye.cy += (eye.ty - eye.cy) * LERP;

        eye.group.setAttribute("transform", "translate(" + eye.cx.toFixed(2) + "," + eye.cy.toFixed(2) + ")");
      }

      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    // Blink: eyelids slide down to cover the eyes then back up
    const lidL = document.getElementById("lid-l");
    const lidR = document.getElementById("lid-r");
    const EYE_H = 76; // full eye height in SVG units

    function animateBlink() {
      const duration = 180; // ms per half (close or open)
      let closeStart = performance.now();

      function closeStep(now) {
        const t = Math.min((now - closeStart) / duration, 1);
        const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
        const h = (EYE_H * ease).toFixed(1);
        lidL.setAttribute("height", h);
        lidR.setAttribute("height", h);
        if (t < 1) { requestAnimationFrame(closeStep); }
        else {
          let openStart = performance.now();
          requestAnimationFrame(function openStep(n) {
            const t2 = Math.min((n - openStart) / duration, 1);
            const ease2 = t2 < 0.5 ? 2*t2*t2 : -1+(4-2*t2)*t2;
            const h2 = (EYE_H * (1 - ease2)).toFixed(1);
            lidL.setAttribute("height", h2);
            lidR.setAttribute("height", h2);
            if (t2 < 1) requestAnimationFrame(openStep);
            else scheduleBlink();
          });
        }
      }
      requestAnimationFrame(closeStep);
    }

    function scheduleBlink() {
      setTimeout(animateBlink, 3000 + Math.random() * 2000);
    }
    scheduleBlink();
  </script>
</body>
</html>
