<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airsup</title>
  <meta property="og:title" content="Airsup" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/assets/brand/og-cover.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="/assets/brand/og-cover.png" />
  <link rel="icon" type="image/png" href="assets/brand/logo-air-sup.png" />
  <link rel="preload" as="image" href="assets/brand/logo-air-sup.png" />
  <link rel="apple-touch-icon" href="assets/brand/logo-air-sup.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <script>document.documentElement.dataset.theme = "dark";</script>
  <style>
    :root {
      --page-bg: #fff;
      --text: #111;
      --text-muted: #666;
      --text-soft: #999;
      --text-faint: #bbb;
      --border: #e8e8e8;
      --border-light: #f0f0f0;
      --card-bg: #fff;
      --accent-bg: #f5f5f5;
      --primary: #111;
      --primary-hover: #333;
      --on-primary: #fff;
      --shadow-card: 0 4px 18px rgba(0,0,0,0.07);
      color-scheme: light;
    }
    html[data-theme="dark"] {
      --page-bg: #000000;
      --text: #f2f2f3;
      --text-muted: #b0b0b0;
      --text-soft: #8a8a8a;
      --text-faint: #444444;
      --border: #282828;
      --border-light: #1e1e1e;
      --card-bg: #0a0a0a;
      --accent-bg: #1e1e1e;
      --primary: #f2f2f3;
      --primary-hover: #dcdce0;
      --on-primary: #181818;
      --shadow-card: 0 4px 18px rgba(0,0,0,0.5);
      color-scheme: dark;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 300;
      background-color: var(--page-bg);
      color: var(--text); line-height: 1.55;
      min-height: 100dvh; -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
      transition: background-color 0.2s, color 0.2s;
    }
    .lp-body-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
      z-index: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.09) 1px, transparent 1px);
      background-size: 28px 28px;
      background-position: 0 0;
    }
    html[data-theme="dark"] .lp-body-inner {
      background-image: radial-gradient(circle, rgba(255,255,255,0.09) 1px, transparent 1px);
    }
    .lp-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 56px 24px 88px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    a { color: inherit; text-decoration: none; }
    button, input { font-family: inherit; font-size: inherit; }
    button { cursor: pointer; border: none; background: none; }
    img { display: block; max-width: 100%; }

    /* ── Header ── */
    .lp-header {
      padding: 20px 28px; display: flex; align-items: center;
      justify-content: space-between;
      background: transparent;
      position: relative; z-index: 10;
    }
    .lp-brand {
      display: inline-flex; align-items: center; gap: 9px;
      font-weight: 500; font-size: 16px; color: var(--text);
    }
    .lp-brand img { height: 22px; width: 22px; border-radius: 6px; }
    html[data-theme="dark"] .lp-brand img { box-shadow: 0 0 0 1px rgba(255,255,255,0.1); }
    .lp-login-link {
      font-size: 14px; font-weight: 400; color: var(--text-muted);
      padding: 8px 0; transition: none;
    }
    .lp-login-link:hover { color: var(--text); }
    /* Give Supi a subtle ring in dark mode so his black body does not
       disappear against the near-black background. */
    #face-svg {
      border-radius: 22px;
      display: block;
    }

    /* Hero: three independent layers. z ordering: Supi(1) < shadow-blob(2) < headline(3) */
    .lp-hero-stack {
      --hero-shift-x: clamp(185px, 27vw, 260px);
      position: relative;
      width: 100%;
      min-height: 260px;
      margin-bottom: 8px;
      overflow: visible;
    }

    /* painted first (behind) via DOM order — no z-index needed */
    .lp-hero-layer--supi {
      position: absolute;
      left: 50%;
      top: 46%;
      transform: translate(calc(-50% + var(--hero-shift-x)), -50%);
      pointer-events: none;
    }
    .lp-hero-face-wrap {
      transform-origin: center center;
    }

    /* painted second (in front of Supi, behind headline) via DOM order */
    .lp-hero-layer--shadow {
      display: block;
      position: absolute;
      left: 50%;
      top: 54%;
      width: 200px;
      height: 160px;
      transform: translate(calc(-50% + var(--hero-shift-x)), calc(-50% + 20px));
      border-radius: 50%;
      background: #000000;
      filter: blur(32px);
      opacity: 0.95;
      pointer-events: none;
    }

    /* painted last (on top) via DOM order */
    .lp-headline {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(40px, 9vw, 72px);
      line-height: 1.08;
      letter-spacing: -0.03em;
      font-weight: 500;
      margin: 0;
      padding: 0 12px;
      text-align: center;
      color: var(--text);
      width: max-content;
      max-width: min(94vw, 52rem);
      white-space: normal;
      pointer-events: none;
      text-shadow:
        0 0 14px rgba(36, 36, 36, 0.85),
        0 2px 10px rgba(36, 36, 36, 0.75),
        0 1px 4px rgba(0, 0, 0, 0.18),
        0 18px 40px rgba(0, 0, 0, 0.9),
        0 32px 60px rgba(0, 0, 0, 0.7),
        0 48px 80px rgba(0, 0, 0, 0.5);
    }

    .lp-sub {
      font-size: 17px; color: var(--text-muted); margin-bottom: 44px; max-width: 440px;
    }

    /* ── Choice cards ── */
    .lp-choices {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
      width: 100%; max-width: 560px; margin-bottom: 48px;
    }
    .lp-choice {
      display: flex; flex-direction: column; align-items: flex-start;
      padding: 26px 24px; border-radius: 22px;
      border: 1.5px solid #333; background: var(--card-bg);
      text-align: left; cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s, background 0.2s;
      text-decoration: none; color: var(--text);
    }
    .lp-choice:hover {
      border-color: var(--text);
      box-shadow: var(--shadow-card);
      transform: translateY(-1px);
    }
    /* Calmer CTA hover in dark mode: no lift, no bright “white” ring, no heavy glow */
    html[data-theme="dark"] .lp-choice:hover {
      border-color: rgba(255, 255, 255, 0.14);
      box-shadow: none;
      transform: none;
      background: #141418;
    }
    .lp-choice-icon {
      width: 36px; height: 36px; border-radius: 9px;
      background: var(--accent-bg); display: flex; align-items: center;
      justify-content: center; margin-bottom: 14px; flex-shrink: 0;
    }
    .lp-choice-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    .lp-choice-sub { font-size: 13px; color: var(--text-soft); line-height: 1.4; }

    .lp-start-wrap {
      position: relative;
      z-index: 10;
      margin-top: 32px;
      margin-bottom: 40px;
    }
    .lp-social-proof {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0;
      margin-bottom: 20px;
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      position: relative;
      z-index: 2;
    }
    .lp-stars {
      color: #f5a623;
      font-size: 12px;
      line-height: 1;
      letter-spacing: 1px;
    }

    /* Primary CTA button */
    .lp-start-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 28px;
      background: #fff;
      border: none;
      border-radius: 100px;
      text-decoration: none;
      color: #111;
      box-shadow: 0 1px 4px rgba(0,0,0,0.13);
      transition: opacity 0.15s;
    }
    .lp-start-link:hover { opacity: 0.85; }
    .lp-start-link:focus-visible {
      outline: 2px solid #111;
      outline-offset: 4px;
    }
    .lp-start-text {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 0.92rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: #111;
    }
    @media (max-width: 480px) {
      .lp-start-text { font-size: 0.88rem; }
    }

    /* ── Login ── */
    .lp-login { width: 100%; max-width: 360px; }
    .lp-login-label {
      font-size: 13px; color: var(--text-soft); margin-bottom: 10px;
    }
    .lp-login-row {
      display: flex; gap: 8px;
    }
    .lp-phone-row .lp-email-input.lp-phone-cc {
      flex: 0 0 auto;
      width: auto;
      min-width: 4.1rem;
      max-width: 5.75rem;
      color: var(--text);
      background: var(--card-bg);
      cursor: pointer;
      -webkit-appearance: menulist;
      appearance: menulist;
    }
    .lp-phone-row .lp-phone-local { flex: 1; min-width: 0; width: 0; }
    .lp-email-input {
      flex: 1; padding: 11px 14px; border-radius: 999px;
      border: 1.5px solid var(--border); font-size: 14px; outline: none;
      transition: border-color 0.15s; background: var(--card-bg); color: var(--text);
    }
    .lp-email-input::placeholder { color: var(--text-soft); }
    .lp-email-input:focus { border-color: var(--text); }
    .lp-password-wrap {
      position: relative;
      flex: 1;
      min-width: 0;
    }
    .lp-password-wrap .btn-password-toggle {
      z-index: 1;
    }
    .lp-password-wrap .lp-email-input {
      width: 100%;
      max-width: none !important;
      padding-right: 44px;
      box-sizing: border-box;
    }
    .lp-login-row.lp-password-row { align-items: center; }
    .btn-password-toggle {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      padding: 0;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text-soft);
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }
    .btn-password-toggle:hover {
      color: var(--text);
      background: var(--accent-bg);
    }
    .btn-password-toggle:focus-visible {
      outline: 2px solid var(--text);
      outline-offset: 2px;
    }
    .btn-password-toggle svg { display: block; }
    .lp-email-btn {
      padding: 11px 20px; border-radius: 999px;
      background: var(--primary); color: var(--on-primary);
      font-size: 14px; font-weight: 400;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .lp-email-btn:hover { background: var(--primary-hover); }
    .lp-email-btn:disabled { opacity: 0.5; cursor: default; }
    .lp-login-msg {
      font-size: 13px; margin-top: 10px; min-height: 18px;
      color: var(--text-muted); display: none;
    }
    .lp-login-msg--error { color: #d93025; }

    /* Footer: one centered block (copyright + links), full width */
    .lp-footer {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 16px 20px;
      font-size: 12px;
      color: var(--text-faint);
      border-top: 1px solid var(--border-light);
      background: var(--page-bg);
      position: relative;
      z-index: 2;
      flex-shrink: 0;
      box-sizing: border-box;
    }
    html[data-theme="dark"] .lp-footer {
      color: var(--text-muted);
    }
    .lp-footer-inner {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      flex-wrap: nowrap;
      gap: 0;
      max-width: 100%;
      white-space: nowrap;
      overflow-x: auto;
    }
    .lp-footer-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: nowrap;
      gap: 0;
    }
    .lp-footer-nav a { color: var(--text-faint); margin: 0 6px; transition: none; white-space: nowrap; }
    .lp-footer-nav a:hover { color: var(--text-muted); }
    html[data-theme="dark"] .lp-footer-nav a {
      color: var(--text-muted);
    }
    html[data-theme="dark"] .lp-footer-nav a:hover {
      color: var(--text);
    }
    @media (max-width: 560px) {
      .lp-hero-stack {
        --hero-shift-x: clamp(140px, 32vw, 200px);
        min-height: 190px;
        margin-bottom: 8px;
      }
      .lp-headline {
        white-space: normal;
        top: 72%;
      }
      .lp-hero-layer--supi { top: 44%; }
      .lp-hero-layer--shadow { top: 52%; transform: translate(calc(-50% + var(--hero-shift-x)), calc(-50% + 18px)); }
    }
    @media (max-width: 480px) {
      .lp-footer { font-size: 10px; padding: 14px 12px; }
      .lp-footer-nav { gap: 6px 10px; }
      .lp-choices { grid-template-columns: 1fr; }
      .lp-login-row { flex-direction: column; }
      .lp-email-btn { border-radius: 999px; }
    }

    /* ── Floating nav bar ── */
    .site-floatnav {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 2px;
      background: rgba(14,14,14,0.96); border: 1px solid rgba(255,255,255,0.13);
      border-radius: 100px; padding: 9px 11px; z-index: 1000;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); white-space: nowrap;
    }
    .site-floatnav-logo {
      display: flex; align-items: center; justify-content: center;
      width: 38px; height: 38px; border-radius: 50%; margin-right: 4px; flex-shrink: 0;
      cursor: grab;
    }
    .site-floatnav-logo img { width: 24px; height: 24px; border-radius: 6px; display: block; pointer-events: none; user-select: none; -webkit-user-drag: none; }
    .site-floatnav-item {
      position: relative; z-index: 1;
      padding: 9px 20px; border-radius: 100px; font-size: 14.5px; font-weight: 400;
      color: #fff; text-decoration: none;
      transition: none;
    }
    .site-floatnav-item:hover { color: #fff; }
    .site-floatnav-item.is-active { background: #fff; color: #000; }
    .site-floatnav-item.is-active:hover { background: rgba(255,255,255,0.92); color: #000; }
    .site-floatnav-hover-pill {
      position: absolute; border-radius: 100px;
      background: rgba(255,255,255,0.11);
      pointer-events: none; z-index: 0;
      transition: left 0.35s cubic-bezier(0.34,1.05,0.64,1),
                  width 0.35s cubic-bezier(0.34,1.05,0.64,1),
                  top 0.35s cubic-bezier(0.34,1.05,0.64,1),
                  height 0.35s cubic-bezier(0.34,1.05,0.64,1);
    }
    @media (max-width: 480px) {
      .site-floatnav { bottom: 16px; padding: 7px 9px; }
      .site-floatnav-item { padding: 8px 14px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="lp-body-inner">
  <header class="lp-header">
    <div class="lp-brand" aria-hidden="true"></div>
  </header>

  <main class="lp-main">
    <div class="lp-hero-stack">
      <div class="lp-hero-layer lp-hero-layer--supi" aria-hidden="true">
        <div class="lp-hero-face-wrap" style="transform:rotate(8deg)">
      <!--
        viewBox 200×200 square logo.
        Left eye:  x=23, y=37, w=72, h=76 → center (59, 75)
        Right eye: x=106,y=37, w=72, h=76 → center (142, 75)
        Pupils centered inside each eye at rest: left x=46 y=61, right x=129 y=61
        MAX_OFFSET=20 lets pupils travel fully in all directions.
      -->
      <svg id="face-svg" viewBox="0 0 200 200" width="108" height="108"
           xmlns="http://www.w3.org/2000/svg"
           style="display:block;">
        <!-- full black square body -->
        <rect x="0" y="0" width="200" height="200" rx="22" fill="#000"/>
        <!-- left eye white rounded square -->
        <rect x="23" y="37" width="72" height="76" rx="12" fill="#fff"/>
        <!-- left pupil, centered at (59, 75) -->
        <g id="pupil-l-g">
          <rect x="46" y="61" width="26" height="28" rx="6" fill="#000"/>
        </g>
        <!-- right eye white rounded square -->
        <rect x="106" y="37" width="72" height="76" rx="12" fill="#fff"/>
        <!-- right pupil, centered at (142, 75) -->
        <g id="pupil-r-g">
          <rect x="129" y="61" width="26" height="28" rx="6" fill="#000"/>
        </g>
        <!-- eyelids: oversized so they fully cover white eye incl. rounded corners -->
        <!-- eyelids start from top of SVG so rounded eye corners are never exposed -->
        <rect id="lid-l" x="19" y="0" width="80" height="0" fill="#000"/>
        <rect id="lid-r" x="102" y="0" width="80" height="0" fill="#000"/>
      </svg>
        </div>
      </div>
      <div class="lp-hero-layer lp-hero-layer--shadow" aria-hidden="true"></div>
      <h1 class="lp-headline">Suppliers for Builders</h1>
    </div>


  </main>

  </div>

  <nav class="site-floatnav" aria-label="Site navigation">
    <a href="/" class="site-floatnav-logo" aria-label="Airsup home">
      <img src="assets/brand/logo-air-sup.png" alt="" />
    </a>
    <a href="/start" class="site-floatnav-item" data-nav="start">Launch Program</a>
    <a href="/pricing" class="site-floatnav-item" data-nav="pricing">Pricing</a>
    <a href="/how-it-works" class="site-floatnav-item" data-nav="how-it-works">How it works</a>
  </nav>

  <footer class="lp-footer">
    <div class="lp-footer-inner">
      <nav class="lp-footer-nav" aria-label="Footer">
    
        <a href="/support">Support</a>
        <a href="/privacy">Privacy Policy</a>
        <a href="/terms">Terms of Service</a>
        <a href="/faq">FAQ</a>
      </nav>
    </div>
  </footer>

  <script>
    // Cursor-tracking eyes with smooth lerp (lazy follow)
    // Target offset is computed instantly from mouse position, but the
    // rendered offset eases toward the target each animation frame.
    // LERP = 0.06 → pupils lag ~16 frames behind → feels fluid, not instant.
    const SVG_SIZE  = 200;
    const MAX_OFFSET = 20;
    const LERP = 0.018; // lower = lazier / more delayed

    const eyeDefs = [
      { group: document.getElementById("pupil-l-g"), ecx: 59,  ecy: 75, cx: 0, cy: 0, tx: 0, ty: 0 },
      { group: document.getElementById("pupil-r-g"), ecx: 142, ecy: 75, cx: 0, cy: 0, tx: 0, ty: 0 },
    ];

    let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    document.addEventListener("mousemove", (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });

    function tick() {
      const svg = document.getElementById("face-svg");
      const r = svg.getBoundingClientRect();

      for (const eye of eyeDefs) {
        // Eye centre in screen pixels
        const ex = r.left + (eye.ecx / SVG_SIZE) * r.width;
        const ey = r.top  + (eye.ecy / SVG_SIZE) * r.height;

        const dx = mouse.x - ex;
        const dy = mouse.y - ey;
        const angle = Math.atan2(dy, dx);
        const dist  = Math.min(Math.hypot(dx, dy) / 120, 1);

        // Target offset in SVG units
        eye.tx = Math.cos(angle) * MAX_OFFSET * dist;
        eye.ty = Math.sin(angle) * MAX_OFFSET * dist;

        // Lerp current toward target (smooth follow)
        eye.cx += (eye.tx - eye.cx) * LERP;
        eye.cy += (eye.ty - eye.cy) * LERP;

        eye.group.setAttribute("transform", "translate(" + eye.cx.toFixed(2) + "," + eye.cy.toFixed(2) + ")");
      }

      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    // Blink: black eyelids grow down to cover each eye, then retract
    const lidL = document.getElementById("lid-l");
    const lidR = document.getElementById("lid-r");
    const EYE_H = 125; // lids grow from y=0, so 125 reaches y=125 > bottom of eye (y=113)

    function animateBlink() {
      const CLOSE_MS = 120;
      const OPEN_MS  = 150;
      const TOTAL_MS = CLOSE_MS + OPEN_MS;
      const shadowEl = document.getElementById("lp-hero-shadow");
      const REST_SHADOW_OPACITY = 0.9;

      function easeInOut(p) {
        return p < 0.5 ? 2 * p * p : -1 + (4 - 2 * p) * p;
      }

      function shadowOpacityAt(p) {
        // p: 0..1 over full blink — 100% at start, ≤5% from midpoint, back to rest at end
        if (p <= 0.5) return 1 - (1 - 0.05) * (p / 0.5);
        return 0.05 + (REST_SHADOW_OPACITY - 0.05) * ((p - 0.5) / 0.5);
      }

      const t0 = performance.now();
      function frame(now) {
        const elapsed = now - t0;
        const p = Math.min(elapsed / TOTAL_MS, 1);

        if (shadowEl) shadowEl.style.opacity = String(shadowOpacityAt(p));

        let h;
        if (elapsed < CLOSE_MS) {
          const pc = elapsed / CLOSE_MS;
          h = EYE_H * easeInOut(pc);
        } else {
          const po = (elapsed - CLOSE_MS) / OPEN_MS;
          h = EYE_H * (1 - easeInOut(Math.min(po, 1)));
        }
        const hs = h.toFixed(1);
        lidL.setAttribute("height", hs);
        lidR.setAttribute("height", hs);

        if (p < 1) {
          requestAnimationFrame(frame);
        } else {
          if (shadowEl) shadowEl.style.opacity = String(REST_SHADOW_OPACITY);
          scheduleBlink();
        }
      }
      requestAnimationFrame(frame);
    }

    function scheduleBlink() {
      setTimeout(animateBlink, 2000 + Math.random() * 3000);
    }
    // First blink after 1.5s so it's visible quickly
    setTimeout(animateBlink, 1500);

    // Sliding gray hover pill
    (function() {
      var slug = location.pathname.replace(/^\/|\/$/g, '') || '';
      var nav = document.querySelector('.site-floatnav');
      if (!nav) return;
      var items = Array.prototype.slice.call(nav.querySelectorAll('.site-floatnav-item[data-nav]'));
      var activeItem = null;
      items.forEach(function(el) {
        if (el.dataset.nav === slug) { el.classList.add('is-active'); activeItem = el; }
      });
      var homeItem = activeItem || items[0];
      var pill = document.createElement('div');
      pill.className = 'site-floatnav-hover-pill';
      nav.insertBefore(pill, nav.firstChild);
      function movePill(el, instant) {
        if (!el) return;
        var nr = nav.getBoundingClientRect(), er = el.getBoundingClientRect();
        if (instant) pill.style.transition = 'none';
        pill.style.left   = (er.left - nr.left) + 'px';
        pill.style.top    = (er.top  - nr.top)  + 'px';
        pill.style.width  = er.width  + 'px';
        pill.style.height = er.height + 'px';
        if (instant) { pill.getBoundingClientRect(); pill.style.transition = ''; }
      }
      if (homeItem) requestAnimationFrame(function() { movePill(homeItem, true); });
      items.forEach(function(el) {
        el.addEventListener('mouseenter', function() { movePill(el, false); });
      });
      nav.addEventListener('mouseleave', function() { movePill(homeItem, false); });
      // Logo drag-and-snap
      var logoImg = document.querySelector('.site-floatnav-logo img');
      if (logoImg) {
        var holdTimer = null, dragging = false, sx = 0, sy = 0;
        function startHold(cx, cy) {
          holdTimer = setTimeout(function() { dragging = true; sx = cx; sy = cy; logoImg.style.transition = 'none'; }, 280);
        }
        function onMove(cx, cy) {
          if (!dragging) return;
          var dx = cx - sx, dy = cy - sy;
          logoImg.style.transform = 'translate(' + dx + 'px,' + dy + 'px) rotate(' + (dx * 0.12) + 'deg)';
        }
        function onRelease() {
          clearTimeout(holdTimer);
          if (!dragging) return;
          dragging = false;
          logoImg.style.transition = 'transform 0.5s cubic-bezier(0.34,1.56,0.64,1)';
          logoImg.style.transform = 'translate(0,0) rotate(0deg)';
        }
        logoImg.addEventListener('mousedown', function(e) { e.preventDefault(); startHold(e.clientX, e.clientY); });
        document.addEventListener('mousemove', function(e) { onMove(e.clientX, e.clientY); });
        document.addEventListener('mouseup', onRelease);
        logoImg.addEventListener('touchstart', function(e) { var t = e.touches[0]; startHold(t.clientX, t.clientY); }, {passive: true});
        document.addEventListener('touchmove', function(e) { if (!dragging) return; e.preventDefault(); var t = e.touches[0]; onMove(t.clientX, t.clientY); }, {passive: false});
        document.addEventListener('touchend', onRelease);
        document.addEventListener('touchcancel', onRelease);
      }
    })();
  </script>
</body>
</html>
