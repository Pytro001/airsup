<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airsup</title>
  <meta name="description" content="From idea to factory, in one conversation." />
  <meta property="og:title" content="Airsup" />
  <meta property="og:description" content="From idea to factory, in one conversation." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/assets/brand/logo-air-sup.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" type="image/png" href="assets/brand/logo-air-sup.png" />
  <link rel="apple-touch-icon" href="assets/brand/logo-air-sup.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <script>
    (function () {
      try {
        var t = localStorage.getItem("airsupTheme");
        document.documentElement.dataset.theme = (t === "light") ? "light" : "dark";
      } catch (e) { document.documentElement.dataset.theme = "dark"; }
    })();
  </script>
  <script src="assets/theme.js" defer></script>
  <style>
    :root {
      --page-bg: #fff;
      --text: #111;
      --text-muted: #666;
      --text-soft: #999;
      --text-faint: #bbb;
      --border: #e8e8e8;
      --border-light: #f0f0f0;
      --card-bg: #fff;
      --accent-bg: #f5f5f5;
      --primary: #111;
      --primary-hover: #333;
      --on-primary: #fff;
      --dot-color: rgba(0,0,0,0.09);
      --shadow-card: 0 4px 18px rgba(0,0,0,0.07);
      color-scheme: light;
    }
    html[data-theme="dark"] {
      --page-bg: #0b0b0d;
      --text: #f2f2f3;
      --text-muted: #9a9aa2;
      --text-soft: #6b6b73;
      --text-faint: #44444a;
      --border: #26262b;
      --border-light: #1d1d22;
      --card-bg: #111114;
      --accent-bg: #1d1d22;
      --primary: #f2f2f3;
      --primary-hover: #dcdce0;
      --on-primary: #0b0b0d;
      --dot-color: rgba(255,255,255,0.11);
      --shadow-card: 0 4px 18px rgba(0,0,0,0.5);
      color-scheme: dark;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: var(--page-bg);
      color: var(--text); line-height: 1.55;
      min-height: 100dvh; -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
      transition: background-color 0.2s, color 0.2s;
    }
    /* Dot grid only above the footer (not in the bottom bar). */
    .lp-body-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
      z-index: 0;
    }
    .lp-body-inner::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: radial-gradient(var(--dot-color) 1.25px, transparent 1.25px);
      background-size: 30px 30px;
      background-position: 0 0;
    }
    .lp-header,
    .lp-main {
      position: relative;
      z-index: 1;
    }
    a { color: inherit; text-decoration: none; }
    button, input { font-family: inherit; font-size: inherit; }
    button { cursor: pointer; border: none; background: none; }
    img { display: block; max-width: 100%; }

    /* ── Header ── */
    .lp-header {
      padding: 20px 28px; display: flex; align-items: center;
      justify-content: space-between;
      background: transparent;
      position: relative; z-index: 10;
    }
    .lp-brand {
      display: inline-flex; align-items: center; gap: 9px;
      font-weight: 600; font-size: 16px; color: var(--text);
    }
    .lp-brand img { height: 22px; width: 22px; border-radius: 6px; }
    html[data-theme="dark"] .lp-brand img { box-shadow: 0 0 0 1px rgba(255,255,255,0.1); }
    .lp-header-right { display: flex; align-items: center; gap: 12px; }
    .lp-login-link {
      font-size: 14px; font-weight: 500; color: var(--text-muted);
      padding: 8px 0; transition: color 0.15s;
    }
    .lp-login-link:hover { color: var(--text); }
    .lp-theme-toggle {
      width: 34px; height: 34px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      transition: color 0.15s, background 0.15s;
    }
    .lp-theme-toggle:hover { color: var(--text); background: var(--accent-bg); }

    /* Give Supi a subtle ring in dark mode so his black body does not
       disappear against the near-black background. */
    #face-svg { border-radius: 22px; transition: box-shadow 0.2s; }
    html[data-theme="dark"] #face-svg {
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 8px 28px rgba(0,0,0,0.6);
    }

    /* ── Main ── */
    .lp-main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 24px 96px;
      text-align: center;
    }
    .lp-headline {
      font-size: clamp(34px, 5.5vw, 58px); line-height: 1.05;
      letter-spacing: -0.03em; font-weight: 600; margin-bottom: 14px;
    }
    .lp-sub {
      font-size: 17px; color: var(--text-muted); margin-bottom: 44px; max-width: 440px;
    }

    /* ── Choice cards ── */
    .lp-choices {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
      width: 100%; max-width: 560px; margin-bottom: 48px;
    }
    .lp-choice {
      display: flex; flex-direction: column; align-items: flex-start;
      padding: 26px 24px; border-radius: 14px;
      border: 1.5px solid var(--border); background: var(--card-bg);
      text-align: left; cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s, background 0.2s;
      text-decoration: none; color: var(--text);
    }
    .lp-choice:hover {
      border-color: var(--text);
      box-shadow: var(--shadow-card);
      transform: translateY(-1px);
    }
    /* Calmer CTA hover in dark mode: no lift, no bright “white” ring, no heavy glow */
    html[data-theme="dark"] .lp-choice:hover {
      border-color: rgba(255, 255, 255, 0.14);
      box-shadow: none;
      transform: none;
      background: #141418;
    }
    .lp-choice-icon {
      width: 36px; height: 36px; border-radius: 9px;
      background: var(--accent-bg); display: flex; align-items: center;
      justify-content: center; margin-bottom: 14px; flex-shrink: 0;
    }
    .lp-choice-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .lp-choice-sub { font-size: 13px; color: var(--text-soft); line-height: 1.4; }

    .lp-start-wrap {
      margin-bottom: 40px;
    }

    /* Primary CTA: play only, no pill background */
    .lp-start-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: none;
      background: none;
      text-decoration: none;
      color: var(--text);
      border-radius: 50%;
      line-height: 0;
      transition: transform 0.15s ease, opacity 0.15s;
    }
    .lp-start-link:hover {
      transform: scale(1.08);
      opacity: 0.92;
    }
    .lp-start-link:focus-visible {
      outline: 2px solid var(--text);
      outline-offset: 6px;
    }
    .lp-start-play {
      width: 80px;
      height: 80px;
      display: block;
    }
    @media (max-width: 480px) {
      .lp-start-play { width: 72px; height: 72px; }
    }

    /* ── Login ── */
    .lp-login { width: 100%; max-width: 360px; }
    .lp-login-label {
      font-size: 13px; color: var(--text-soft); margin-bottom: 10px;
    }
    .lp-login-row {
      display: flex; gap: 8px;
    }
    .lp-phone-row .lp-email-input.lp-phone-cc {
      flex: 0 0 auto;
      width: auto;
      min-width: 4.1rem;
      max-width: 5.75rem;
      color: var(--text);
      background: var(--card-bg);
      cursor: pointer;
      -webkit-appearance: menulist;
      appearance: menulist;
    }
    .lp-phone-row .lp-phone-local { flex: 1; min-width: 0; width: 0; }
    .lp-email-input {
      flex: 1; padding: 11px 14px; border-radius: 999px;
      border: 1.5px solid var(--border); font-size: 14px; outline: none;
      transition: border-color 0.15s; background: var(--card-bg); color: var(--text);
    }
    .lp-email-input::placeholder { color: var(--text-soft); }
    .lp-email-input:focus { border-color: var(--text); }
    .lp-password-wrap {
      position: relative;
      flex: 1;
      min-width: 0;
    }
    .lp-password-wrap .btn-password-toggle {
      z-index: 1;
    }
    .lp-password-wrap .lp-email-input {
      width: 100%;
      max-width: none !important;
      padding-right: 44px;
      box-sizing: border-box;
    }
    .lp-login-row.lp-password-row { align-items: center; }
    .btn-password-toggle {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      padding: 0;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text-soft);
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }
    .btn-password-toggle:hover {
      color: var(--text);
      background: var(--accent-bg);
    }
    .btn-password-toggle:focus-visible {
      outline: 2px solid var(--text);
      outline-offset: 2px;
    }
    .btn-password-toggle svg { display: block; }
    .lp-email-btn {
      padding: 11px 20px; border-radius: 999px;
      background: var(--primary); color: var(--on-primary);
      font-size: 14px; font-weight: 500;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .lp-email-btn:hover { background: var(--primary-hover); }
    .lp-email-btn:disabled { opacity: 0.5; cursor: default; }
    .lp-login-msg {
      font-size: 13px; margin-top: 10px; min-height: 18px;
      color: var(--text-muted); display: none;
    }
    .lp-login-msg--error { color: #d93025; }

    /* Footer: one centered block (copyright + links), full width */
    .lp-footer {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 16px 20px;
      font-size: 12px;
      color: var(--text-faint);
      border-top: 1px solid var(--border-light);
      background: var(--page-bg);
      position: relative;
      z-index: 2;
      flex-shrink: 0;
      box-sizing: border-box;
    }
    .lp-footer-inner {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      flex-wrap: nowrap;
      gap: 0;
      max-width: 100%;
      white-space: nowrap;
      overflow-x: auto;
    }
    .lp-footer-legal { margin-right: 6px; }
    .lp-footer-legal { flex-shrink: 0; }
    .lp-footer-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: nowrap;
      gap: 0;
    }
    .lp-footer-nav a { color: var(--text-faint); margin: 0 6px; transition: color 0.15s; white-space: nowrap; }
    .lp-footer-nav a:hover { color: var(--text-muted); }
    @media (max-width: 480px) {
      .lp-footer { font-size: 10px; padding: 14px 12px; }
      .lp-footer-nav { gap: 6px 10px; }
      .lp-choices { grid-template-columns: 1fr; }
      .lp-login-row { flex-direction: column; }
      .lp-email-btn { border-radius: 999px; }
    }
  </style>
</head>
<body>
  <div class="lp-body-inner">
  <header class="lp-header">
    <div class="lp-brand" aria-hidden="true"></div>
    <div class="lp-header-right">
      <button type="button" class="lp-login-link" id="lp-login-toggle">Login</button>
      <button type="button" class="lp-theme-toggle" data-theme-toggle aria-label="Toggle theme"></button>
    </div>
  </header>

  <main class="lp-main">
    <!-- cursor-tracking face -->
    <div style="margin-bottom:16px;">
      <!--
        viewBox 200×200 square logo.
        Left eye:  x=23, y=37, w=72, h=76 → center (59, 75)
        Right eye: x=106,y=37, w=72, h=76 → center (142, 75)
        Pupils centered inside each eye at rest: left x=46 y=61, right x=129 y=61
        MAX_OFFSET=20 lets pupils travel fully in all directions.
      -->
      <svg id="face-svg" viewBox="0 0 200 200" width="120" height="120"
           xmlns="http://www.w3.org/2000/svg"
           style="display:block;margin:0 auto;">
        <!-- full black square body -->
        <rect x="0" y="0" width="200" height="200" rx="22" fill="#000"/>
        <!-- left eye white rounded square -->
        <rect x="23" y="37" width="72" height="76" rx="12" fill="#fff"/>
        <!-- left pupil, centered at (59, 75) -->
        <g id="pupil-l-g">
          <rect x="46" y="61" width="26" height="28" rx="6" fill="#000"/>
        </g>
        <!-- right eye white rounded square -->
        <rect x="106" y="37" width="72" height="76" rx="12" fill="#fff"/>
        <!-- right pupil, centered at (142, 75) -->
        <g id="pupil-r-g">
          <rect x="129" y="61" width="26" height="28" rx="6" fill="#000"/>
        </g>
        <!-- eyelids: oversized so they fully cover white eye incl. rounded corners -->
        <!-- eyelids start from top of SVG so rounded eye corners are never exposed -->
        <rect id="lid-l" x="19" y="0" width="80" height="0" fill="#000"/>
        <rect id="lid-r" x="102" y="0" width="80" height="0" fill="#000"/>
      </svg>
    </div>

    <h1 class="lp-headline">From idea to product,<br>in one conversation.</h1>

    <div class="lp-start-wrap">
      <a href="/start" class="lp-start-link" aria-label="Start">
        <svg class="lp-start-play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
          <path d="M8 5v14l11-7z" />
        </svg>
      </a>
    </div>

    <div class="lp-login" id="lp-login-section" style="display:none;">
      <p class="lp-login-label" style="margin-bottom:6px;">Admin login</p>
      <div class="lp-login-row lp-phone-row">
        <select class="lp-email-input lp-phone-cc" id="lp-phone-cc" aria-label="Country code"></select>
        <input type="text" class="lp-email-input lp-phone-local" id="lp-phone-local" inputmode="numeric" pattern="[0-9]*" autocomplete="tel-national" placeholder="Digits only" />
      </div>
      <div class="lp-login-row lp-password-row" style="margin-top:8px;">
        <div class="lp-password-wrap password-input-wrap">
          <input type="password" class="lp-email-input" id="lp-password" placeholder="Password (6+)" minlength="6" maxlength="64" autocomplete="current-password" />
          <button type="button" class="btn-password-toggle" data-password-for="lp-password" aria-label="Show password" aria-pressed="false" tabindex="0">
            <span class="btn-password-toggle__show" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
            <span class="btn-password-toggle__hide" hidden aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.5 18.5 0 0 1 3-4.5M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></span>
          </button>
        </div>
        <button type="button" class="lp-email-btn" id="lp-send-btn">Login</button>
      </div>
      <p class="lp-login-msg" id="lp-login-msg"></p>
    </div>
  </main>

  </div>

  <footer class="lp-footer">
    <div class="lp-footer-inner">
      <span class="lp-footer-legal">&copy; <span id="lp-year"></span> Airsup</span>
      <nav class="lp-footer-nav" aria-label="Footer">
        <a href="/supi">Supi</a>
        <a href="/support">Support</a>
        <a href="/privacy">Privacy Policy</a>
        <a href="/terms">Terms of Service</a>
        <a href="/faq">FAQ</a>
      </nav>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="assets/phone-dial.js"></script>
  <script src="assets/password-toggles.js"></script>
  <script>
    document.getElementById("lp-year").textContent = new Date().getFullYear();

    const cfg = window.AIRSUP_CONFIG || {};
    const sb = cfg.supabaseUrl && cfg.supabaseAnonKey
      ? window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            storage: window.localStorage,
            detectSessionInUrl: true,
          },
        })
      : null;

    // Auto-redirect signed-in visitors straight to /workspace, but only
    // if they have fully completed onboarding (a real profile exists).
    // Users who have a session but no profile should stay on the landing
    // page and be prompted to sign up again.
    document.body.style.visibility = "hidden";
    var revealTimer = setTimeout(function () { document.body.style.visibility = ""; }, 1800);

    async function checkAndRedirect() {
      if (!sb) return false;
      try {
        const { data: sessionData } = await sb.auth.getSession();
        const session = sessionData?.session;
        if (!session) return false;

        // Check if onboarding is done: profile must have a company OR a headline
        // (suppliers store "supplier" in headline; customers store their company name)
        const { data: profile } = await sb
          .from("profiles")
          .select("company, headline")
          .eq("id", session.user.id)
          .maybeSingle();

        const isComplete = profile && (profile.company || profile.headline);
        if (isComplete) {
          window.location.replace("/workspace");
          return true;
        }
        return false;
      } catch (e) { return false; }
    }

    (async () => {
      const redirecting = await checkAndRedirect();
      if (!redirecting) {
        clearTimeout(revealTimer);
        document.body.style.visibility = "";

        if (sb) {
          // If the user signs in while on this page (successful login), check again
          sb.auth.onAuthStateChange(async (event) => {
            if (event === "SIGNED_IN") {
              await checkAndRedirect();
              document.body.style.visibility = "";
            }
          });
        }
      }
    })();

    // Toggle login section
    const loginToggle = document.getElementById("lp-login-toggle");
    const loginSection = document.getElementById("lp-login-section");
    loginToggle.addEventListener("click", () => {
      const visible = loginSection.style.display !== "none";
      loginSection.style.display = visible ? "none" : "block";
      loginToggle.textContent = visible ? "Login" : "Close";
      if (!visible) document.getElementById("lp-phone-local")?.focus();
    });

    // Phone + password login (digits + country code → fake email).
    const phoneCc = document.getElementById("lp-phone-cc");
    const phoneLocal = document.getElementById("lp-phone-local");
    if (phoneCc && window.AIRSUP_PHONE) {
      phoneCc.innerHTML = window.AIRSUP_PHONE.dialCodeOptionsHtml("49");
    }
    window.AIRSUP_PHONE?.wirePhoneLocalInput(phoneLocal);
    const passwordInput = document.getElementById("lp-password");
    const sendBtn    = document.getElementById("lp-send-btn");
    const msgEl      = document.getElementById("lp-login-msg");

    function showMsg(text, isError) {
      msgEl.textContent = text;
      msgEl.style.display = "block";
      msgEl.className = "lp-login-msg" + (isError ? " lp-login-msg--error" : "");
    }

    /**
     * Phone login still goes through Supabase "email" auth with a technical address
     * (digits@login.airsup). If the Email provider is disabled, Supabase returns errors about
     * email even though the user entered only a number.
     */
    function formatPhoneLoginAuthError(err) {
      var m = (err && err.message) || "Login failed.";
      var low = m.toLowerCase();
      if (
        low.indexOf("email") !== -1 &&
        (low.indexOf("disabled") !== -1 || low.indexOf("not enabled") !== -1 || low.indexOf("provider") !== -1)
      ) {
        return "Phone sign-in must have Authentication \u2192 Providers \u2192 Email enabled in the Supabase dashboard. The app only asks for your number; internally it uses a technical address (your digits @ login.airsup) with a password, not a real inbox. After enabling Email, try again. Turn off \u201cConfirm email\u201d if you use email confirmation.";
      }
      return m;
    }

    function phoneToFakeEmail(phone) {
      // Strip everything except digits and leading +
      const digits = phone.replace(/[^0-9]/g, "");
      return digits + "@login.airsup";
    }

    async function doLogin() {
      const phone = window.AIRSUP_PHONE
        ? window.AIRSUP_PHONE.mergeDialAndNational(phoneCc && phoneCc.value, phoneLocal && phoneLocal.value)
        : "";
      const pin   = passwordInput.value;
      if (!phone || phone.replace(/[^0-9]/g, "").length < 7) { showMsg("Enter a valid phone number with country code.", true); return; }
      if (!pin || pin.length < 6) { showMsg("This login is for admins only. Enter your admin password.", true); return; }
      if (!sb) { showMsg("Not configured.", true); return; }
      sendBtn.disabled = true;
      sendBtn.textContent = "Signing in…";
      const fakeEmail = phoneToFakeEmail(phone);

      const { data: siData, error: siErr } = await sb.auth.signInWithPassword({ email: fakeEmail, password: pin });
      if (!siErr && siData?.session) { window.location.href = "/workspace"; return; }

      sendBtn.disabled = false; sendBtn.textContent = "Login";
      showMsg(formatPhoneLoginAuthError(siErr) || "Login failed.", true);
    }

    sendBtn.addEventListener("click", doLogin);
    phoneLocal?.addEventListener("keydown", (e) => { if (e.key === "Enter") passwordInput.focus(); });
    passwordInput?.addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });

    // Cursor-tracking eyes with smooth lerp (lazy follow)
    // Target offset is computed instantly from mouse position, but the
    // rendered offset eases toward the target each animation frame.
    // LERP = 0.06 → pupils lag ~16 frames behind → feels fluid, not instant.
    const SVG_SIZE  = 200;
    const MAX_OFFSET = 20;
    const LERP = 0.06; // lower = lazier / more delayed

    const eyeDefs = [
      { group: document.getElementById("pupil-l-g"), ecx: 59,  ecy: 75, cx: 0, cy: 0, tx: 0, ty: 0 },
      { group: document.getElementById("pupil-r-g"), ecx: 142, ecy: 75, cx: 0, cy: 0, tx: 0, ty: 0 },
    ];

    let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    document.addEventListener("mousemove", (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });

    function tick() {
      const svg = document.getElementById("face-svg");
      const r = svg.getBoundingClientRect();

      for (const eye of eyeDefs) {
        // Eye centre in screen pixels
        const ex = r.left + (eye.ecx / SVG_SIZE) * r.width;
        const ey = r.top  + (eye.ecy / SVG_SIZE) * r.height;

        const dx = mouse.x - ex;
        const dy = mouse.y - ey;
        const angle = Math.atan2(dy, dx);
        const dist  = Math.min(Math.hypot(dx, dy) / 120, 1);

        // Target offset in SVG units
        eye.tx = Math.cos(angle) * MAX_OFFSET * dist;
        eye.ty = Math.sin(angle) * MAX_OFFSET * dist;

        // Lerp current toward target (smooth follow)
        eye.cx += (eye.tx - eye.cx) * LERP;
        eye.cy += (eye.ty - eye.cy) * LERP;

        eye.group.setAttribute("transform", "translate(" + eye.cx.toFixed(2) + "," + eye.cy.toFixed(2) + ")");
      }

      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    // Blink: black eyelids grow down to cover each eye, then retract
    const lidL = document.getElementById("lid-l");
    const lidR = document.getElementById("lid-r");
    const EYE_H = 125; // lids grow from y=0, so 125 reaches y=125 > bottom of eye (y=113)

    function animateBlink() {
      const CLOSE_MS = 120;
      const OPEN_MS  = 150;

      function run(startH, endH, duration, onDone) {
        const t0 = performance.now();
        (function frame(now) {
          const p = Math.min((now - t0) / duration, 1);
          const e = p < 0.5 ? 2*p*p : -1+(4-2*p)*p; // ease in-out
          const h = (startH + (endH - startH) * e).toFixed(1);
          lidL.setAttribute("height", h);
          lidR.setAttribute("height", h);
          if (p < 1) requestAnimationFrame(frame);
          else onDone();
        })(t0);
      }

      run(0, EYE_H, CLOSE_MS, () => {
        run(EYE_H, 0, OPEN_MS, scheduleBlink);
      });
    }

    function scheduleBlink() {
      setTimeout(animateBlink, 2000 + Math.random() * 3000);
    }
    // First blink after 1.5s so it's visible quickly
    setTimeout(animateBlink, 1500);
  </script>
</body>
</html>
